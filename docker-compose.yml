x-common-volumes: &common-volumes
  - ./:/MoneyPrinterTurboCN
  - ./models:/MoneyPrinterTurboCN/models
  - ./config.toml:/MoneyPrinterTurboCN/config.toml
  - ./storage:/MoneyPrinterTurboCN/storage
  # Mount timezone files from host to use local time
  - /etc/localtime:/etc/localtime:ro
  - /etc/timezone:/etc/timezone:ro

services:
  webui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: "moneyprinterturbocn-webui"
    ports:
      - "8501:8501"
    command: [ "python3", "-m", "streamlit", "run", "./webui/Main.py","--browser.serverAddress=localhost","--server.enableCORS=True","--browser.gatherUsageStats=False" ]
    volumes: *common-volumes
    restart: always
    environment:
      - PYTHONUNBUFFERED=1
      # Set timezone to use local time
      - TZ=Asia/Shanghai
      # Set time zone for Python
      - PYTHON_TZ=Asia/Shanghai
      # GPU environment variables - will be ignored if no GPU available
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
      - IMAGEIO_FFMPEG_EXE=/usr/bin/ffmpeg
    # GPU configuration - will gracefully fallback to CPU if no GPU available
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: "moneyprinterturbocn-api"
    ports:
      - "8080:8080"
    command: [ "python3", "main.py" ]
    volumes: *common-volumes
    restart: always
    environment:
      - PYTHONUNBUFFERED=1
      # Set timezone to use local time
      - TZ=Asia/Shanghai
      # Set time zone for Python
      - PYTHON_TZ=Asia/Shanghai
      # GPU environment variables - will be ignored if no GPU available
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
      - IMAGEIO_FFMPEG_EXE=/usr/bin/ffmpeg
    # GPU configuration - will gracefully fallback to CPU if no GPU available
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
