# Docker Compose configuration for GPU mode
# Usage: docker-compose up -d
#
# The FastAPI backend serves both the API and the Vue frontend static files.

x-common-volumes: &common-volumes
  - ./:/Coiner
  - ./models:/Coiner/models
  - ./config.toml:/Coiner/config.toml
  - ./storage:/Coiner/storage
  # Mount timezone files from host to use local time
  - /etc/localtime:/etc/localtime:ro
  - /etc/timezone:/etc/timezone:ro

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: "coiner-api"
    ports:
      - "8000:8000"
    volumes: *common-volumes
    restart: always
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Shanghai
      - PYTHON_TZ=Asia/Shanghai
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
      - IMAGEIO_FFMPEG_EXE=/usr/bin/ffmpeg
    # GPU configuration - will gracefully fallback to CPU if no GPU available
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
