x-common-volumes: &common-volumes
  # Create config.toml from config.example.toml and set [app].api_key before
  # using the API service. config.toml is gitignored and persists on the host.
  - ./config.toml:/MoneyPrinterTurbo/config.toml
  - mpt-storage:/MoneyPrinterTurbo/storage

services:
  webui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: "moneyprinterturbo-webui"
    ports:
      - "127.0.0.1:8501:8501"
    command: [ "streamlit", "run", "./webui/Main.py","--browser.serverAddress=127.0.0.1","--server.enableCORS=True","--browser.gatherUsageStats=False" ]
    volumes: *common-volumes
    restart: always
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: "moneyprinterturbo-api"
    ports:
      - "127.0.0.1:8080:8080"
    command: [ "python3", "main.py" ]
    volumes: *common-volumes
    restart: always

volumes:
  mpt-storage:
