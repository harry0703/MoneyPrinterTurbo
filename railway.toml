# ─────────────────────────────────────────────────────────────
# Clipp Engine — railway.toml
# ─────────────────────────────────────────────────────────────

[build]
builder        = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Health check: confirm process is alive, not that it's idle.
# /api/v1/health always returns 200 while the process is running.
# Long timeout (10min) prevents Railway from killing a busy container.
healthcheckPath    = "/api/v1/health"
healthcheckTimeout = 600

# NEVER restart on failure — Railway's health check fires during
# CPU-intensive encoding and incorrectly triggers restarts.
# Tasks are in-memory; a restart wipes all in-progress work.
# The worker detects engine restarts and re-queues jobs automatically.
restartPolicyType = "NEVER"
