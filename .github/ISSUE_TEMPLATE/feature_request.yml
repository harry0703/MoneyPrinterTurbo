name: ✨ 기능 추가 | Feature Request
description: 이 프로젝트에 대한 새로운 아이디어나 제안 제출 | Suggest a new idea for this project
title: "[Feature]: "
labels:
  - enhancement

body:
  - type: textarea
    attributes:
      label: 요구사항 설명 | Problem Statement
      description: |
        해결하고자 하는 문제나 요구사항을 설명해 주세요
        Please describe the problem you want to solve
      placeholder: |
        사용하는 과정에서 ...을 겪었습니다
        I encountered... when using this project
    validations:
      required: true
  - type: textarea
    attributes:
      label: 제안하는 해결 방안 | Proposed Solution
      description: |
        실현 가능하다고 생각하는 해결 방안이나 구현 방식을 설명해 주세요
        Please describe your suggested solution or implementation
      placeholder: |
        이 문제를 해결하기 위해 ...기능을 추가하는 것을 고려할 수 있습니다
        Consider adding... feature to address this issue
    validations:
      required: true