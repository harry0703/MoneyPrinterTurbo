name: 🐛 Bug | Bug Report
description: 오류 또는 예기치 않은 동작 보고 | Report an error or unexpected behavior
title: "[Bug]: "
labels:
  - bug

body:
  - type: markdown
    attributes:
      value: |
        **이슈를 제출하기 전에 다음 문서를 먼저 읽어주세요: [Getting Started (English)](https://github.com/harry0703/MoneyPrinterTurbo/blob/main/README-en.md#system-requirements-) 또는 [빠른 시작 (중국어)](https://github.com/harry0703/MoneyPrinterTurbo/blob/main/README.md#%E5%BF%AB%E9%80%9F%E5%BC%80%E5%A7%8B-).**
        
        **Before submitting an issue, please make sure you've read the following documentation: [Getting Started (English)](https://github.com/harry0703/MoneyPrinterTurbo/blob/main/README-en.md#system-requirements-) or [빠른 시작 (Korean)](https://github.com/harry0703/MoneyPrinterTurbo/blob/main/README.md#%E5%BF%AB%E9%80%9F%E5%BC%80%E5%A7%8B-).**
        
  - type: textarea
    attributes:
      label: 문제 설명 | Current Behavior
      description: |
        발생한 문제를 설명해 주세요
        Describe the issue you're experiencing
      placeholder: |
        ...작업을 수행할 때 프로그램에 ...문제가 발생했습니다
        When I perform..., the program shows...
    validations:
      required: true
  - type: textarea
    attributes:
      label: 재현 단계 | Steps to Reproduce
      description: |
        이 문제를 어떻게 재현하는지 자세히 설명해 주세요
        Describe in detail how to reproduce this issue
      placeholder: |
        1. ...을 엽니다
        2. ...을 클릭합니다
        3. 오류가 발생합니다...
        
        1. Open...
        2. Click on...
        3. Error occurs...
    validations:
      required: true
  - type: textarea
    attributes:
      label: 오류 로그 | Error Logs
      description: |
        관련 오류 메시지나 로그를 제공해 주세요 (민감한 정보가 포함되지 않도록 주의하세요)
        Please provide any error messages or logs (be careful not to include sensitive information)
      placeholder: |
        오류 메시지, 로그 또는 스크린샷...
        Error messages, logs, or screenshots...
    validations:
      required: true
  - type: input
    attributes:
      label: Python 버전 | Python Version
      description: |
        사용 중인 Python 버전
        The Python version you're using
      placeholder: v3.13.0, v3.10.0, etc.
    validations:
      required: true
  - type: input
    attributes:
      label: 운영체제 | Operating System
      description: |
        사용 중인 운영체제 정보
        Your operating system information
      placeholder: macOS 14.1, Windows 11, Ubuntu 22.04, etc.
    validations:
      required: true
  - type: input
    attributes:
      label: MoneyPrinterTurbo 버전 | Version
      description: |
        사용 중인 MoneyPrinterTurbo 버전
        The version of MoneyPrinterTurbo you're using
      placeholder: v1.2.2, etc.
    validations:
      required: true
  - type: textarea
    attributes:
      label: 추가 정보 | Additional Information
      description: |
        문제 해결에 도움이 되는 기타 정보 (스크린샷, 동영상 등)
        Any other information that might help solve the issue (screenshots, videos, etc.)
    validations:
      required: false