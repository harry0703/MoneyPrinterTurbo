name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  tests:
    name: Python tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Compile Python sources
        run: uv run python -m compileall app cli.py main.py webui test

      - name: Run unit tests with coverage
        # pytest 兼容现有 unittest.TestCase，同时会收集仓库中的 pytest 风格
        # 测试，避免测试文件已存在但 CI 没有真正执行。
        run: uv run python -X utf8 -m coverage run -m pytest -q test

      - name: Report test coverage
        run: uv run python -m coverage report
