########## LiteLLM (Cổng AI — hơn 100 nhà cung cấp)
# LiteLLM định tuyến đến bất kỳ nhà cung cấp LLM nào qua giao diện thống nhất.
# Dùng cho các nhà cung cấp không được hỗ trợ trực tiếp ở trên: Anthropic (API gốc),
# AWS Bedrock, Google Vertex AI, Cohere, Mistral, Together AI, v.v.
# Truy cập https://docs.litellm.ai/docs/providers để xem danh sách đầy đủ.
#
# LiteLLM tự động đọc khóa API nhà cung cấp từ biến môi trường:
#   OPENAI_API_KEY, ANTHROPIC_API_KEY, GEMINI_API_KEY, AWS_ACCESS_KEY_ID, v.v.
# Đặt biến môi trường phù hợp cho nhà cung cấp bạn chọn trước khi chạy.
#
# Tên mô hình theo định dạng LiteLLM: "provider/model-name"
# Ví dụ: "openai/gpt-4o", "anthropic/claude-sonnet-4-20250514",
#         "bedrock/anthropic.claude-3-5-sonnet-20241022-v2:0",
#         "gemini/gemini-2.5-flash", "ollama/llama3"
litellm_model_name = "openai/gpt-4o-mini"

# Nhà cung cấp phụ đề, "edge" hoặc "whisper"
# Nếu để trống, sẽ không tạo phụ đề
subtitle_provider = "edge"

#
# ImageMagick
#
# Sau khi cài đặt, ImageMagick sẽ được tự động phát hiện, ngoại trừ trên Windows!
# Trên Windows, ví dụ "C:\Program Files (x86)\ImageMagick-7.1.1-Q16-HDRI\magick.exe"
# Tải từ https://imagemagick.org/archive/binaries/ImageMagick-7.1.1-29-Q16-x64-static.exe

# imagemagick_path = "C:\\Program Files (x86)\\ImageMagick-7.1.1-Q16\\magick.exe"


#
# FFMPEG
#
# 通常情况下，ffmpeg 会被自动下载，并且会被自动检测到。
# 但是如果你的环境有问题，无法自动下载，可能会遇到如下错误：
#   RuntimeError: No ffmpeg exe could be found.
#   Install ffmpeg on your system, or set the IMAGEIO_FFMPEG_EXE environment variable.
# 此时你可以手动下载 ffmpeg 并设置 ffmpeg_path，下载地址：https://www.gyan.dev/ffmpeg/builds/

# Trong điều kiện bình thường, ffmpeg được tải xuống và phát hiện tự động.
# Tuy nhiên, nếu có vấn đề với môi trường của bạn ngăn việc tải xuống tự động, bạn có thể gặp lỗi sau:
#   RuntimeError: No ffmpeg exe could be found.
#   Install ffmpeg on your system, or set the IMAGEIO_FFMPEG_EXE environment variable.
# Trong trường hợp đó, bạn có thể tải ffmpeg thủ công và đặt ffmpeg_path, liên kết tải: https://www.gyan.dev/ffmpeg/builds/

# ffmpeg_path = "C:\\Users\\harry\\Downloads\\ffmpeg.exe"

# Bộ mã hóa video. Mặc định libx264 an toàn nhất; người dùng nâng cao có thể thử bộ mã hóa phần cứng.
# 视频编码器。默认 libx264 最稳定；高级用户可以尝试硬件编码器提升速度。
# Nếu bộ mã hóa được chọn không được FFmpeg hoặc driver hiện tại hỗ trợ, ứng dụng sẽ quay về libx264.
# Các giá trị có sẵn: "libx264", "h264_nvenc", "h264_amf", "h264_qsv", "h264_mf", "h264_videotoolbox"
# video_codec = "libx264"
#########################################################################################

# Khi video được tạo thành công, endpoint tải video do dịch vụ API cung cấp,
# mặc định là địa chỉ và cổng lắng nghe hiện tại của dịch vụ
# Ví dụ: http://127.0.0.1:8080/tasks/6357f542-a4e1-46a1-b4c9-bf3bd0df5285/final-1.mp4
# Nếu bạn cần cung cấp dịch vụ ra bên ngoài bằng tên miền (thường dùng nginx làm proxy),
# bạn có thể đặt thành tên miền của mình
# Ví dụ: https://xxxx.com/tasks/6357f542-a4e1-46a1-b4c9-bf3bd0df5285/final-1.mp4
# 当视频生成成功后，API服务提供的视频下载接入点，默认为当前服务的地址和监听端口
# endpoint="https://xxxx.com"
endpoint = ""


# Vị trí lưu trữ tư liệu video
# material_directory = ""                    # Chỉ ra rằng tư liệu video sẽ được tải xuống thư mục mặc định ./storage/cache_videos dưới dự án hiện tại
# material_directory = "/user/harry/videos"  # Chỉ ra rằng tư liệu video sẽ được tải xuống thư mục được chỉ định
# material_directory = "task"                # Chỉ ra rằng tư liệu video sẽ được tải xuống thư mục của tác vụ hiện tại, cách này không cho phép chia sẻ tư liệu đã tải

# 视频素材存放位置
# material_directory = ""                    #表示将视频素材下载到默认的文件夹，默认文件夹为当前项目下的 ./storage/cache_videos
# material_directory = "/user/harry/videos"  #表示将视频素材下载到指定的文件夹中
# material_directory = "task"                #表示将视频素材下载到当前任务的文件夹中，这种方式无法共享已经下载的视频素材

material_directory = ""

# Dùng để quản lý trạng thái tác vụ.
# Redis được mong đợi là riêng tư cho ứng dụng này. Không để lộ cho những người
# viết không đáng tin cậy, vì trạng thái tác vụ được giải tuần tự hóa để tương thích
# với các bản ghi hiện có.
enable_redis = false
redis_host = "localhost"
redis_port = 6379
redis_db = 0
redis_password = ""

# 文生视频时的最大并发任务数 (Số tác vụ đồng thời tối đa khi tạo video)
max_concurrent_tasks = 5

# 并发任务已满后的最大排队任务数，超过后接口返回 429，避免匿名请求无限堆积
# Số tác vụ xếp hàng tối đa sau khi các tác vụ đồng thời đã đầy, vượt quá sẽ trả về 429
max_queued_tasks = 100


[whisper]
# Chỉ có hiệu lực khi subtitle_provider là "whisper"

# Chạy trên GPU với FP16
# model = WhisperModel(model_size, device="cuda", compute_type="float16")

# Chạy trên GPU với INT8
# model = WhisperModel(model_size, device="cuda", compute_type="int8_float16")

# Chạy trên CPU với INT8
# model = WhisperModel(model_size, device="cpu", compute_type="int8")

# Kích thước mô hình được khuyến nghị: "large-v3"
model_size = "large-v3"
# Nếu muốn dùng GPU, đặt device="cuda"
device = "CPU"
compute_type = "int8"


[proxy]
### Dùng proxy để truy cập API Pexels
### Định dạng: "http://<tên_người_dùng>:<mật_khẩu>@<proxy>:<cổng>"
### Ví dụ: "http://user:pass@proxy:1234"
### Tài liệu: https://requests.readthedocs.io/en/latest/user/advanced/#proxies

# http = "http://10.10.1.10:3128"
# https = "http://10.10.1.10:1080"

