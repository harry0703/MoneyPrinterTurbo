moonshot_model_name = "kimi-k2.7-code"

########## Khóa API OneAPI
# Truy cập https://github.com/songquanpeng/one-api để lấy khóa API
oneapi_api_key = ""
oneapi_base_url = ""
oneapi_model_name = ""

########## Khóa API Azure
# Truy cập https://learn.microsoft.com/vi-vn/azure/ai-services/openai/ để biết thêm chi tiết
# Tài liệu API: https://learn.microsoft.com/vi-vn/azure/ai-services/openai/reference
azure_api_key = ""
azure_base_url = ""
