[app]
video_source = "pexels" # "pexels" hoặc "pixabay" hoặc "coverr"

# Ẩn hoặc hiển thị bảng cấu hình
hide_config = false

# Thời gian chờ cho mỗi yêu cầu streaming Azure TTS V1 (edge_tts), tính bằng giây.
# Khi mạng bất thường, máy chủ giới hạn tốc độ, hoặc giọng nói không khớp ngôn ngữ văn bản,
# edge_tts có thể bị treo lâu. Mặc định 30 giây tránh tác vụ WebUI không phản hồi;
# môi trường mạng chậm hoặc dùng proxy có thể tăng giá trị này.
# Đặt 0 để tắt timeout.
edge_tts_timeout = 30

# Có xác minh chứng chỉ TLS cho các cuộc gọi API bên ngoài và tải tư liệu không.
# Mặc định phải bật để tránh API key Pexels/Pixabay và tư liệu tải về bị tấn công man-in-the-middle.
# Chỉ tạm đặt thành false khi rõ ràng cần thiết trong môi trường proxy doanh nghiệp hoặc chứng chỉ tự ký.
tls_verify = true

# Khóa API Pexels
# Đăng ký tại https://www.pexels.com/api/ để lấy khóa API.
# Bạn có thể dùng nhiều khóa để tránh giới hạn tốc độ.
# Ví dụ: pexels_api_keys = ["123adsf4567adf89","abd1321cd13efgfdfhi"]
# Dùng dấu ngoặc kép ASCII thẳng xung quanh mỗi khóa. Dấu ngoặc cong sao chép từ văn bản phong phú sẽ phá vỡ phân tích TOML.
# 请使用英文半角双引号包裹每个 Key；从富文本复制来的弯引号会导致 TOML 解析失败。
# Lưu ý đặc biệt về định dạng: Key được bao bởi dấu ngoặc kép tiếng Anh, nhiều Key cách nhau bằng dấu phẩy
pexels_api_keys = []

# Khóa API Pixabay
# Đăng ký tại https://pixabay.com/api/docs/ để lấy khóa API.
# Bạn có thể dùng nhiều khóa để tránh giới hạn tốc độ.
# Ví dụ: pixabay_api_keys = ["123adsf4567adf89","abd1321cd13efgfdfhi"]
# Dùng dấu ngoặc kép ASCII thẳng xung quanh mỗi khóa. Dấu ngoặc cong sao chép từ văn bản phong phú sẽ phá vỡ phân tích TOML.
# 请使用英文半角双引号包裹每个 Key；从富文本复制来的弯引号会导致 TOML 解析失败。
# Lưu ý đặc biệt về định dạng: Key được bao bởi dấu ngoặc kép tiếng Anh, nhiều Key cách nhau bằng dấu phẩy
pixabay_api_keys = []

# Khóa API Coverr
# Đăng ký tại https://coverr.co/developers?ctx=header_navigation để lấy khóa API ngay.
# Gói miễn phí (Demo) giới hạn 50 yêu cầu/giờ — đủ cho vài tác vụ video mỗi giờ.
# Nâng cấp lên gói Pro/Ultimate để có 2000/giờ.
# Coverr cung cấp video stock HD/4K miễn phí (theo điều khoản giấy phép Coverr,
# xem https://coverr.co/license), chủ yếu là ngang 16:9; nếu bạn tạo video
# dọc 9:16 dạng ngắn, hãy ưu tiên Pexels/Pixabay và dùng Coverr để mở rộng
# danh mục cho nội dung ngang/điện ảnh.
# Bạn có thể dùng nhiều khóa để tránh giới hạn tốc độ.
# Ví dụ: coverr_api_keys = ["123adsf4567adf89","abd1321cd13efgfdfhi"]
# Dùng dấu ngoặc kép ASCII thẳng xung quanh mỗi khóa. Dấu ngoặc cong sao chép từ văn bản phong phú sẽ phá vỡ phân tích TOML.
# 请使用英文半角双引号包裹每个 Key；从富文本复制来的弯引号会导致 TOML 解析失败。
# Lưu ý đặc biệt về định dạng: Key được bao bởi dấu ngoặc kép tiếng Anh, nhiều Key cách nhau bằng dấu phẩy
coverr_api_keys = []

# Khóa API TwelveLabs (tùy chọn) — https://twelvelabs.io
# Tích hợp hiểu video / nhúng đa phương thức TwelveLabs (tùy chọn).
# Bật hai tính năng opt-in:
#   * Marengo (nhúng đa phương thức) sắp xếp lại theo ngữ nghĩa các từ khóa tìm kiếm
#     tự động theo mức độ liên quan đến chủ đề video, để B-roll phù hợp nhất được
#     tải về trước khi ngân sách thời gian eo hẹp.
#   * Pegasus (hiểu video) có thể QA / mô tả một clip từ URL của nó.
# Để trống để giữ nguyên hoàn toàn hành vi của MoneyPrinterTurbo.
# Cấu hình khóa API TwelveLabs từ bảng điều khiển TwelveLabs (https://twelvelabs.io) và cài
# phụ thuộc tùy chọn bằng `uv sync --extra twelvelabs`.
# Đăng ký tại https://playground.twelvelabs.io để lấy khóa API.
# Bạn có thể dùng nhiều khóa để tránh giới hạn tốc độ.
# Ví dụ: twelvelabs_api_keys = ["tlk_123adsf4567","tlk_abd1321cd13ef"]
# 请使用英文半角双引号包裹每个 Key；从富文本复制来的弯引号会导致 TOML 解析失败。
twelvelabs_api_keys = []

# Sắp xếp lại từ khóa tìm kiếm theo mức độ liên quan Marengo trước khi tải tư liệu.
# Yêu cầu twelvelabs_api_keys ở trên. Bị bỏ qua trong chế độ "khớp tư liệu theo kịch bản"
# khi thứ tự từ khóa được đặt có chủ ý theo thứ tự tường thuật của kịch bản.
twelvelabs_rerank_terms = false

# Ghi đè mô hình tùy chọn (hiển thị mặc định).
# twelvelabs_marengo_model = "marengo3.0"
# twelvelabs_pegasus_model = "pegasus1.5"

# Các nhà cung cấp được hỗ trợ (Supported providers):
#   moonshot    (Kimi / Moonshot AI)
#   openai
#   aihubmix   (OpenAI-compatible AI model gateway)
#   aimlapi     (OpenAI-compatible multi-model AI API)
#   azure
#   qwen        (通义千问)
#   deepseek
#   gemini
#   ollama
#   oneapi
#   cloudflare
#   minimax
#   evolink    (OpenAI-compatible multi-model AI gateway)
#   volcengine (VolcEngine Ark OpenAI-compatible API)
#   mimo       (Xiaomi MiMo)
#   ernie       (文心一言)
#   modelscope  (魔搭社区)
#   litellm     (100+ providers via LiteLLM gateway)
llm_provider = "moonshot"

########## Cài Đặt Pollinations AI
# Truy cập https://pollinations.ai/ để biết thêm thông tin
# Khóa API là tùy chọn - để trống để truy cập công khai
pollinations_api_key = ""
# URL cơ bản cho Pollinations API.
# Để trống để dùng endpoint mặc định (https://text.pollinations.ai/openai).
# Lưu ý: endpoint cũ "https://pollinations.ai/api/v1" không còn chấp nhận
# yêu cầu (trả về 405 Method Not Allowed), nên chỉ đặt giá trị này nếu bạn có
# endpoint tùy chỉnh đang hoạt động.
pollinations_base_url = ""
# Mô hình mặc định để tạo văn bản
pollinations_model_name = "openai-fast"

########## Cài Đặt Ollama
# Không cần đặt trừ khi bạn muốn dùng proxy của riêng mình
ollama_base_url = ""
# Kiểm tra các mô hình có sẵn tại https://ollama.com/library
ollama_model_name = ""

########## Khóa API OpenAI
# Lấy khóa API tại https://platform.openai.com/api-keys
# 也可以填写兼容 OpenAI Chat Completions 协议的供应商密钥，
# 例如 OpenRouter 这类提供自定义 base_url 的平台。
openai_api_key = ""
# Không cần đặt trừ khi bạn muốn dùng proxy của riêng mình
# 如果使用兼容 OpenAI 接口的平台，请在这里填写对应的 base_url。
openai_base_url = ""
# Kiểm tra các mô hình có sẵn tại https://platform.openai.com/account/limits
# 如果使用兼容供应商，请填写该平台要求的模型 ID。
openai_model_name = "gpt-4o-mini"

########## Khóa API AIHubMix
# AIHubMix tương thích OpenAI và có thể dùng một khóa API để truy cập nhiều mô hình.
# Truy cập https://aihubmix.com để đăng ký và lấy khóa API.
aihubmix_api_key = ""
aihubmix_base_url = "https://aihubmix.com/v1"
aihubmix_model_name = "gpt-5.4-mini"

########## Khóa API AIML
# AIML API tương thích OpenAI và có thể dùng một khóa API để truy cập nhiều họ mô hình.
# Truy cập https://aimlapi.com/app/keys để tạo khóa API.
aimlapi_api_key = ""
aimlapi_base_url = "https://api.aimlapi.com/v1"
aimlapi_model_name = "openai/gpt-4o-mini"

########## Khóa API Kimi / Moonshot
# Truy cập https://platform.kimi.com hoặc https://platform.kimi.ai để lấy khóa API.
