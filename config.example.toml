########## Khóa API Groq
# Truy cập https://console.groq.com/keys để lấy khóa API
# Tài liệu API: https://console.groq.com/docs/api-reference
# Các mô hình có sẵn: https://console.groq.com/docs/api-reference#models-list
groq_api_key = ""
groq_model_name = "llama-3.3-70b-versatile"
groq_base_url = "https://api.groq.com/openai/v1"

