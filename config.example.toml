[app]
video_source = "pexels" # "pexels" or "pixabay"

# Ocultar o painel de configurações básicas na interface
hide_config = false

# Tempo limite para requisição de streaming do Azure TTS V1 (edge_tts) em segundos.
# O edge_tts pode travar devido a anomalias de rede, limite de taxa do servidor ou incompatibilidade de idioma da voz.
# O padrão de 30 segundos evita que a tarefa na WebUI fique sem resposta; aumente se tiver uma conexão lenta ou usar proxy.
# Defina como 0 para desativar o tempo limite.
edge_tts_timeout = 30

# Verificar certificados TLS para APIs externas e downloads de materiais.
# Ativado por padrão para evitar ataques man-in-the-middle em chaves Pexels/Pixabay ou materiais.
# Altere temporariamente para false apenas se explicitamente necessário em ambientes corporativos com proxy ou certificados autoassinados.
tls_verify = true

# Pexels API Key
# Register at https://www.pexels.com/api/ to get your API key.
# You can use multiple keys to avoid rate limits.
# For example: pexels_api_keys = ["123adsf4567adf89","abd1321cd13efgfdfhi"]
# Use straight ASCII double quotes around each key. Smart quotes copied from rich text will break TOML parsing.
# Use aspas duplas padrão para envolver cada chave; aspas copiadas de textos formatados podem quebrar o TOML.
# Atenção especial ao formato: chaves entre aspas duplas e separadas por vírgulas.
pexels_api_keys = []

# Pixabay API Key
# Register at https://pixabay.com/api/docs/ to get your API key.
# You can use multiple keys to avoid rate limits.
# For example: pixabay_api_keys = ["123adsf4567adf89","abd1321cd13efgfdfhi"]
# Use straight ASCII double quotes around each key. Smart quotes copied from rich text will break TOML parsing.
# Use aspas duplas padrão para envolver cada chave; aspas copiadas de textos formatados podem quebrar o TOML.
# Atenção especial ao formato: chaves entre aspas duplas e separadas por vírgulas.
pixabay_api_keys = []

# Coverr API Key
# Register at https://coverr.co/developers?ctx=header_navigation to get your API key instantly.
# Free tier (Demo) is limited to 50 requests/hour — sufficient for a few
# video tasks per hour. Upgrade to Pro/Ultimate subscription for 2000/hour.
# Coverr provides free HD/4K stock videos (subject to Coverr license terms,
# see https://coverr.co/license), mostly 16:9 landscape; if
# you generate 9:16 short-form videos, prefer Pexels/Pixabay as primary
# and use Coverr to widen the catalog for landscape/cinematic content.
# You can use multiple keys to avoid rate limits.
# For example: coverr_api_keys = ["123adsf4567adf89","abd1321cd13efgfdfhi"]
# Use straight ASCII double quotes around each key. Smart quotes copied from rich text will break TOML parsing.
# Use aspas duelas padrão para envolver cada chave; aspas copiadas de textos formatados podem quebrar o TOML.
# Atenção especial ao formato: chaves entre aspas duplas e separadas por vírgulas.
coverr_api_keys = []

# Provedores suportados (Supported providers):
#   openai
#   aihubmix   (Gateway de modelos de IA compatível com OpenAI)
#   aimlapi    (API de IA compatível com OpenAI para múltiplos modelos)
#   moonshot   (Moonshot AI)
#   azure
#   qwen       (Tongyi Qwen)
#   deepseek
#   gemini
#   ollama
#   g4f        (desativado por padrão; ative enable_g4f=true apenas após aceitar os riscos)
#   oneapi
#   cloudflare
#   minimax
#   mimo       (Xiaomi MiMo)
#   ernie      (ERNIE Baidu)
#   modelscope (Comunidade ModelScope)
#   litellm    (Mais de 100 provedores via gateway LiteLLM)
llm_provider = "openai"

########## Configurações Pollinations AI
# Acesse https://pollinations.ai/ para saber mais
# API Key é opcional - deixe vazio para acesso público
pollinations_api_key = ""
# URL Base para a API do Pollinations.
# Deixe vazio para usar o endpoint padrão (https://text.pollinations.ai/openai).
pollinations_base_url = ""
# Modelo padrão para geração de texto
pollinations_model_name = "openai-fast"

########## Configurações Ollama
# Não há necessidade de configurar, exceto se quiser usar o seu próprio proxy
ollama_base_url = ""
# Verifique seus modelos disponíveis em https://ollama.com/library
ollama_model_name = ""

########## OpenAI API Key
# Obtenha sua chave de API em https://platform.openai.com/api-keys
# Também pode inserir chaves de provedores compatíveis com a API do OpenAI Chat Completions,
# como OpenRouter ou outras plataformas que oferecem suporte a base_url personalizado.
openai_api_key = ""
# Não há necessidade de configurar, exceto se quiser usar o seu próprio proxy
# Se estiver usando uma plataforma compatível com OpenAI, preencha o respectivo base_url aqui.
openai_base_url = ""
# Verifique seus modelos disponíveis em https://platform.openai.com/account/limits
# Se estiver usando um provedor compatível, preencha o ID do modelo exigido por essa plataforma.
openai_model_name = "gpt-4o-mini"

########## AIHubMix API Key
# AIHubMix é compatível com OpenAI e permite usar uma única chave para acessar vários modelos.
# Acesse https://aihubmix.com/?aff=CEve para se cadastrar e obter sua chave de API.
aihubmix_api_key = ""
aihubmix_base_url = "https://aihubmix.com/v1"
aihubmix_model_name = "gpt-5.4-mini"

########## AIML API Key
# AIML API é compatível com OpenAI e permite usar uma chave de API para acessar múltiplos modelos.
# Acesse https://aimlapi.com/app/keys para criar sua chave de API.
aimlapi_api_key = ""
aimlapi_base_url = "https://api.aimlapi.com/v1"
aimlapi_model_name = "openai/gpt-4o-mini"

########## Moonshot API Key
# Acesse https://platform.moonshot.cn/console/api-keys para obter sua chave de API.
moonshot_api_key = ""
moonshot_base_url = "https://api.moonshot.cn/v1"
moonshot_model_name = "moonshot-v1-8k"

########## OneAPI API Key
# Acesse https://github.com/songquanpeng/one-api para obter sua chave de API
oneapi_api_key = ""
oneapi_base_url = ""
oneapi_model_name = ""

########## G4F
# g4f depende de engenharia reversa de terceiros e não é recomendado para produção.
# Prefira APIs oficiais, provedores compatíveis com OpenAI, LiteLLM, Ollama ou inferência local.
# Se ainda precisar dele, instale a dependência opcional com:
#   uv sync --extra g4f
enable_g4f = false
# Acesse https://github.com/xtekky/gpt4free para mais detalhes
# Lista de modelos suportados: https://github.com/xtekky/gpt4free/blob/main/g4f/models.py
g4f_model_name = "gpt-3.5-turbo"

########## Azure API Key
# Acesse https://learn.microsoft.com/pt-br/azure/ai-services/openai/ para mais detalhes
# Documentação da API: https://learn.microsoft.com/pt-br/azure/ai-services/openai/reference
azure_api_key = ""
azure_base_url = ""
azure_model_name = "gpt-35-turbo"        # substitua pelo nome da implantação do seu modelo
azure_api_version = "2024-02-15-preview"

########## Gemini API Key
gemini_api_key = ""
gemini_model_name = "gemini-2.5-flash"

########## Grok API Key
grok_api_key = ""
grok_model_name = "grok-4.3"
grok_base_url = "https://api.x.ai/v1"

########## Groq API Key
# Acesse https://console.groq.com/keys para obter suas chaves de API
# Documentação da API: https://console.groq.com/docs/api-reference
# Modelos disponíveis: https://console.groq.com/docs/api-reference#models-list
groq_api_key = ""
groq_model_name = "llama-3.3-70b-versatile"
groq_base_url = "https://api.groq.com/openai/v1"

########## Qwen API Key
# Acesse https://dashscope.console.aliyun.com/apiKey para obter sua chave de API
# Acesse os links abaixo para obter mais detalhes
# https://tongyi.aliyun.com/qianwen/
# https://help.aliyun.com/zh/dashscope/developer-reference/model-introduction
qwen_api_key = ""
qwen_model_name = "qwen-max"


########## MiniMax API Key
# Acesse https://platform.minimax.io ou https://platform.minimaxi.com para obter sua chave de API
# A API da MiniMax é compatível com OpenAI
# Modelos disponíveis: MiniMax-M3 (padrão), MiniMax-M2.7, MiniMax-M2.7-highspeed
# Se sua chave de API retornar 401 em api.minimax.io, tente o endpoint da China: https://api.minimaxi.com/v1
minimax_api_key = ""
minimax_base_url = "https://api.minimax.io/v1"
minimax_model_name = "MiniMax-M3"

########## Xiaomi MiMo API Key
# A API do Xiaomi MiMo é compatível com OpenAI.
# Acesse https://platform.xiaomimimo.com/docs/zh-CN/quick-start/first-api-call para mais detalhes.
mimo_api_key = ""
mimo_base_url = "https://api.xiaomimimo.com/v1"
mimo_model_name = "mimo-v2.5-pro"
# O TTS do Xiaomi MiMo usa a mesma chave de API e base_url que o MiMo LLM.
mimo_tts_model_name = "mimo-v2.5-tts"
# Prompt opcional para o estilo da narração de fala do MiMo TTS.
mimo_tts_style_prompt = "Por favor, leia com uma entonação natural, clara e adequada para narração de vídeos curtos."

########## DeepSeek API Key
# Acesse https://platform.deepseek.com/api_keys para obter sua chave de API
deepseek_api_key = ""
deepseek_base_url = "https://api.deepseek.com"
deepseek_model_name = "deepseek-chat"


########## ModelScope API Key
# Acesse https://modelscope.cn/docs/model-service/API-Inference/intro para obter sua chave de API
# Lembre-se de vincular sua conta do Alibaba Cloud antes de usar a API.
modelscope_api_key = ""
modelscope_base_url = "https://api-inference.modelscope.cn/v1/"
modelscope_model_name = "Qwen/Qwen3-32B"

########## LiteLLM (Gateway de IA — Mais de 100 provedores)
# O LiteLLM roteia para qualquer provedor de LLM através de uma interface unificada.
# Use para provedores não suportados nativamente acima: Anthropic, AWS Bedrock, Vertex AI, etc.
# Acesse https://docs.litellm.ai/docs/providers para a lista completa.
#
# O LiteLLM lê automaticamente as chaves de API das variáveis de ambiente:
#   OPENAI_API_KEY, ANTHROPIC_API_KEY, GEMINI_API_KEY, AWS_ACCESS_KEY_ID, etc.
# Defina a variável de ambiente correspondente antes de executar.
#
# Nome do modelo no formato LiteLLM: "provedor/nome-do-modelo"
# Exemplos: "openai/gpt-4o", "anthropic/claude-sonnet-4-20250514",
#           "bedrock/anthropic.claude-3-5-sonnet-20241022-v2:0",
#           "gemini/gemini-2.5-flash", "ollama/llama3"
litellm_model_name = "openai/gpt-4o-mini"

# Provedor de legendas (Subtitle Provider), "edge" ou "whisper"
# Se vazio, as legendas não serão geradas
subtitle_provider = "edge"

#
# ImageMagick
#
# Depois de instalado, o ImageMagick será detectado automaticamente, exceto no Windows!
# No Windows, por exemplo: "C:\Program Files (x86)\ImageMagick-7.1.1-Q16-HDRI\magick.exe"
# Baixe de https://imagemagick.org/archive/binaries/ImageMagick-7.1.1-29-Q16-x64-static.exe

# imagemagick_path = "C:\\Program Files (x86)\\ImageMagick-7.1.1-Q16\\magick.exe"


#
# FFMPEG
#
# Geralmente, o ffmpeg é baixado e detectado de forma automática.
# No entanto, se o seu ambiente tiver problemas e não puder fazer o download automático, você poderá ver o seguinte erro:
#   RuntimeError: No ffmpeg exe could be found.
#   Install ffmpeg on your system, or set the IMAGEIO_FFMPEG_EXE environment variable.
# Nesse caso, você pode baixar o ffmpeg manualmente e definir o ffmpeg_path. Link de download: https://www.gyan.dev/ffmpeg/builds/

# ffmpeg_path = "C:\\Users\\harry\\Downloads\\ffmpeg.exe"

# Codificador de vídeo. O padrão libx264 é o mais estável; usuários avançados podem testar codificadores por hardware.
# Se o codificador selecionado não for suportado pelo FFmpeg ou driver atual, o programa voltará para libx264.
# Valores disponíveis: "libx264", "h264_nvenc", "h264_amf", "h264_qsv", "h264_mf", "h264_videotoolbox"
# video_codec = "libx264"
#########################################################################################

# Ponto de acesso para download do vídeo após a geração bem-sucedida. O padrão é o endereço e a porta do serviço atual.
# Por exemplo: http://127.0.0.1:8080/tasks/6357f542-a4e1-46a1-b4c9-bf3bd0df5285/final-1.mp4
# Se precisar expor o serviço externamente usando um domínio (geralmente via proxy nginx), configure o seu domínio.
# Por exemplo: https://xxxx.com/tasks/6357f542-a4e1-46a1-b4c9-bf3bd0df5285/final-1.mp4
# endpoint="https://xxxx.com"
endpoint = ""


# Local de armazenamento dos materiais de vídeo
# material_directory = ""                    # Indica que os materiais serão baixados para a pasta padrão ./storage/cache_videos do projeto
# material_directory = "/user/harry/videos"  # Indica que os materiais serão baixados para uma pasta específica
# material_directory = "task"                # Indica que os materiais serão baixados para a pasta da tarefa atual (impede compartilhamento de materiais baixados)

material_directory = ""

# Usado para o gerenciamento de estado das tarefas.
# Espera-se que o Redis seja privado para este app. Não exponha a gravadores não confiáveis,
# pois o estado da tarefa é desserializado para compatibilidade com registros existentes.
enable_redis = false
redis_host = "localhost"
redis_port = 6379
redis_db = 0
redis_password = ""

# Número máximo de tarefas de geração de vídeo simultâneas
max_concurrent_tasks = 5

# Número máximo de tarefas em fila quando a concorrência estiver cheia. Exceder esse limite retornará 429, evitando acúmulo infinito de requisições anônimas.
max_queued_tasks = 100


[whisper]
# Apenas aplicável quando subtitle_provider for "whisper"

# Executar na GPU com FP16
# model = WhisperModel(model_size, device="cuda", compute_type="float16")

# Executar na GPU com INT8
# model = WhisperModel(model_size, device="cuda", compute_type="int8_float16")

# Executar na CPU com INT8
# model = WhisperModel(model_size, device="cpu", compute_type="int8")

# model_size recomendado: "large-v3"
model_size = "large-v3"
# se quiser usar GPU, defina device="cuda"
device = "CPU"
compute_type = "int8"


[proxy]
### Use um proxy para acessar a API do Pexels
### Formato: "http://<username>:<password>@<proxy>:<port>"
### Exemplo: "http://user:pass@proxy:1234"
### Doc: https://requests.readthedocs.io/en/latest/user/advanced/#proxies

# http = "http://10.10.1.10:3128"
# https = "http://10.10.1.10:1080"

[azure]
# Azure Speech API Key
# Obtenha sua chave de API em https://portal.azure.com/#view/Microsoft_Azure_ProjectOxford/CognitiveServicesHub/~/SpeechServices
speech_key = ""
speech_region = ""

[siliconflow]
# SiliconFlow API Key
# Obtenha sua chave de API em https://siliconflow.cn
api_key = ""

[ui]
# Configurações relacionadas à UI
# Ocultar informações de logs na interface
hide_log = false

# Configuração de posição das legendas (Subtitle position settings)
# Valores possíveis (Available values): "top", "center", "bottom", "custom"
# subtitle_position = "custom"
# Posição personalizada, representando a porcentagem a partir do topo (0-100), eficaz apenas se subtitle_position = "custom"
# custom_position = 70.0

########## Upload-Post (Envio cruzado para TikTok/Instagram)
# O Upload-Post permite publicar automaticamente os vídeos gerados no TikTok e Instagram.
# Acesse https://upload-post.com para criar uma conta e obter sua chave de API.
# Documentação da API: https://docs.upload-post.com

# Ativar/desativar integração com Upload-Post
upload_post_enabled = false

# Sua chave de API do Upload-Post
upload_post_api_key = ""

# Seu nome de usuário do Upload-Post
upload_post_username = ""

# Plataformas para envio (opções: "tiktok", "instagram")
upload_post_platforms = ["tiktok", "instagram"]

# Postar vídeos automaticamente após a geração (se false, você precisará chamar a API manualmente)
upload_post_auto_upload = false
