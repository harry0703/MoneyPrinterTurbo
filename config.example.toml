speech_key = ""
speech_region = ""

[siliconflow]
# Khóa API SiliconFlow
# Lấy khóa API tại https://siliconflow.cn
api_key = ""

[elevenlabs]
# Khóa API ElevenLabs
# Lấy khóa API tại https://elevenlabs.io/app/settings/api-keys
# Đánh dấu giọng nói là yêu thích trong thư viện giọng nói ElevenLabs để chúng xuất hiện ở đây.
api_key = ""
# Mô hình: eleven_multilingual_v2 | eleven_flash_v2_5 | eleven_v3
model_id = "eleven_multilingual_v2"

[ui]
# Cài đặt liên quan đến giao diện người dùng
# 是否隐藏日志信息 (Ẩn thông tin nhật ký hay không)
# Ẩn nhật ký trong giao diện hay không
hide_log = false

# Cài đặt vị trí phụ đề (字幕位置设置)
# Các giá trị có sẵn (可选值): "top", "center", "bottom", "custom"
# subtitle_position = "custom"
# Vị trí tùy chỉnh theo phần trăm từ đầu trang (0-100), chỉ có hiệu lực khi subtitle_position = "custom"
# 自定义位置，表示离顶部的百分比 (0-100)，仅当 subtitle_position = "custom" 时生效
# custom_position = 70.0

########## Upload-Post (Đăng chéo lên TikTok/Instagram/YouTube Shorts)
# Upload-Post cho phép bạn tự động đăng chéo video đã tạo lên TikTok, Instagram và YouTube Shorts.
# Truy cập https://upload-post.com để tạo tài khoản và lấy khóa API.
# Tài liệu API: https://docs.upload-post.com

# Bật/tắt tích hợp Upload-Post
upload_post_enabled = false

# Khóa API Upload-Post của bạn
upload_post_api_key = ""

# Tên người dùng Upload-Post của bạn
upload_post_username = ""

# Các nền tảng để đăng chéo (tùy chọn: "tiktok", "instagram", "youtube")
upload_post_platforms = ["tiktok", "instagram"]

# Tự động đăng chéo video sau khi tạo xong (nếu false, bạn cần gọi API thủ công)
upload_post_auto_upload = false

# Trạng thái quyền riêng tư YouTube Shorts (tùy chọn: "public", "unlisted", "private")
upload_post_youtube_privacy_status = "public"

# Chatterbox TTS (tự lưu trữ, tương thích OpenAI) ##########################
# Chatterbox (https://github.com/resemble-ai/chatterbox, MIT) là mô hình TTS mã nguồn mở,
# lưu trữ cục bộ với nhân bản giọng nói zero-shot — một giải pháp thay thế tự lưu trữ
# cho ElevenLabs. Chạy máy chủ cung cấp endpoint tương thích OpenAI tại
# POST {base_url}/audio/speech (ví dụ devnen/Chatterbox-TTS-Server hoặc
# travisvn/chatterbox-tts-api), sau đó đặt base_url bên dưới. Trong WebUI chọn
# "Chatterbox TTS" làm máy chủ TTS, hoặc qua API truyền voice_name như
# "chatterbox:<giọng>". Phụ đề dùng dự phòng toàn văn bản (không có timestamps cấp từ);
# đặt subtitle_provider = "whisper" để đồng bộ chặt hơn.
[chatterbox]
# Mặc định nhắm đến travisvn/chatterbox-tts-api chạy cục bộ trên cổng 4123.
base_url = "http://127.0.0.1:4123/v1"
api_key = ""
model_id = "chatterbox"
# Các giọng nói do máy chủ của bạn cung cấp; hiển thị trong dropdown WebUI dưới dạng chatterbox:<tên>
voices = ["default-Female"]
